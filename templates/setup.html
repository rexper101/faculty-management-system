<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup — Faculty Information System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
<div class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-lg" style="max-width:420px;width:100%">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <div class="text-primary fs-1"><i class="bi bi-shield-lock-fill"></i></div>
        <h4 class="fw-bold">Initial Setup</h4>
        <p class="text-muted small">Create your administrator account</p>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for c, m in messages %}
          <div class="alert alert-{{ c }}">{{ m }}</div>
        {% endfor %}{% endif %}
      {% endwith %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required minlength="6">
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="confirm_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Create Account</button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
